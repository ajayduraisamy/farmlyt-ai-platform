name: farmlyt_ai
description: AI-powered smart farming assistant app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_messaging: ^16.1.2

  # State Management
  flutter_riverpod: ^3.3.1

  # HTTP / API
  dio: ^5.9.2

  # Local Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Image
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  lottie: ^3.3.2
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0
  smooth_page_indicator: ^2.0.1
  permission_handler: ^12.0.1

  # TTS
  flutter_tts: ^4.2.5

  # Connectivity
  connectivity_plus: ^7.0.0

  # Image Compress
  flutter_image_compress: ^2.4.0

  # Icons
  flutter_svg: ^2.2.4
  iconsax: ^0.0.8

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0

  google_mlkit_translation: ^0.13.1

  translator: ^1.0.4+1

  razorpay_flutter: ^1.3.7
  fl_chart: ^1.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_annotation: ^4.11.0
  json_serializable: ^6.13.0
  build_runner: ^2.13.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/app_logo.png
    - assets/weather/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21